global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Flask app metrics
  - job_name: 'flask-app'
    static_configs:
      - targets: ['jenkins-app:5000']
    
  # Scrape Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
